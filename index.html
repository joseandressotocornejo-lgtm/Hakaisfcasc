<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hakai | Sistema de Flujo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }
        body { height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; background:#070012; overflow:hidden; }
        body::before { content:""; position:absolute; width:600px; height:600px; background: radial-gradient(circle, rgba(255,0,255,0.12), transparent 70%); filter: blur(120px); right:5%; top:15%; z-index: -1; }
        .card { width:90%; max-width:500px; border-radius:40px; padding:40px; position:relative; background: rgba(255,255,255,0.02); backdrop-filter: blur(30px); border:1px solid rgba(255,0,200,0.2); box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        .lightning { position:absolute; left:-35px; top:-25px; width:110px; z-index: 2; }
        .lightning path { stroke:#ff00cc; stroke-width:6; fill:none; filter: drop-shadow(0 0 12px #ff00cc); }
        .title { font-size:38px; font-weight:300; color:white; letter-spacing: 6px; text-transform: uppercase; margin-left: 60px; margin-bottom: 10px; }
        .divider { height:1px; background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent); margin:25px 0; }
        .input-area { margin-top: 20px; }
        input { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 18px; border-radius: 18px; color: white; outline: none; transition: 0.4s; font-size: 14px; }
        input:focus { border-color: #ff00cc; background: rgba(255,0,200,0.04); }
        #response { margin-top: 20px; font-size: 14px; color: rgba(255,255,255,0.5); line-height: 1.6; min-height: 40px; }
        .buttons { display:flex; gap:12px; margin-top:30px; }
        button { flex:1; padding:14px; border-radius:16px; border:1px solid rgba(255,255,255,0.05); background: rgba(255,255,255,0.03); color:rgba(255,255,255,0.6); cursor:pointer; font-size: 11px; letter-spacing: 1px; transition: 0.3s; }
        .confirm { background: linear-gradient(45deg,#9d00ff,#ff00cc); border:none; color:white; }
        .confirm:hover { box-shadow:0 10px 20px rgba(255,0,200,0.4); transform:translateY(-2px); }
    </style>
</head>
<body>

<div class="card">
    <svg class="lightning" viewBox="0 0 100 150">
        <path d="M60 0 L20 80 L55 80 L35 150 L85 60 L50 60 Z"/>
    </svg>
    <div class="title">Hakai</div>
    <div class="divider"></div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Dime qué ocurrió hoy..." onkeypress="if(event.key==='Enter') processData()">
    </div>
    <div id="response">Hakai en línea. Lista para procesar flujo.</div>
    <div class="buttons">
        <button class="confirm" onclick="processData()">Sincronizar</button>
        <button onclick="exportarExcel()">Reporte</button>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyBLYst6oGbjZ-QkFaLBQyiY3fwg334NGZw"; // Tu clave ya está aquí
    let state = JSON.parse(localStorage.getItem('hakai_v4')) || {
        total: 0,
        categorias: { arriendo: 0, mercaderia: 0, transporte: 0, salud: 0, ahorro: 0, personal: 0 },
        logs: []
    };

    function updateUI() {
        localStorage.setItem('hakai_v4', JSON.stringify(state));
    }

    async function processData() {
        const inputField = document.getElementById('user-input');
        const input = inputField.value;
        const resDiv = document.getElementById('response');
        if (!input) return;

        resDiv.style.color = "#ff4df3";
        resDiv.innerText = "Hakai sincronizando...";

        const prompt = `Eres Hakai, inteligencia financiera. Estado actual: ${JSON.stringify(state)}. 
        Reglas: 
        1. Si excede presupuesto en CUALQUIER categoría, resta de 'ahorro' y avisa que se repondrá el próximo mes. 
        2. Aprende hábitos. 
        3. Si pregunta saldo o detalles, responde sutilmente.
        Usuario dice: "${input}". 
        Responde breve y termina SIEMPRE con ### seguido del objeto JSON del estado actualizado.`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const dataIA = await response.json();
            const textoIA = dataIA.candidates[0].content.parts[0].text;
            const [mensaje, nuevoEstado] = textoIA.split('###');

            if(nuevoEstado) {
                state = JSON.parse(nuevoEstado.trim());
                updateUI();
            }

            resDiv.style.color = "rgba(255,255,255,0.8)";
            resDiv.innerText = mensaje.trim();
            inputField.value = "";
        } catch (e) {
            resDiv.innerText = "Error en el núcleo Hakai.";
        }
    }

    function exportarExcel() {
        let content = "Fecha,Accion\n" + state.logs.map(l => `${l.date},${l.msg}`).join("\n");
        const blob = new Blob([content], {type: 'text/csv'});
        window.open(URL.createObjectURL(blob));
    }
</script>
</body>
</html>
