<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAKAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }
        body { height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; background:#070012; overflow:hidden; }
        body::before { content:""; position:absolute; width:600px; height:600px; background: radial-gradient(circle, rgba(255,0,204,0.1), transparent 70%); filter: blur(120px); right:5%; top:15%; z-index: -1; }
        .card { width:90%; max-width:500px; border-radius:40px; padding:40px; position:relative; background: rgba(255,255,255,0.02); backdrop-filter: blur(30px); border:1px solid rgba(255,0,200,0.2); box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        .lightning { position:absolute; left:-35px; top:-25px; width:110px; z-index: 2; }
        .lightning path { stroke:#ff00cc; stroke-width:6; fill:none; filter: drop-shadow(0 0 12px #ff00cc); }
        .title { font-size:38px; font-weight:300; color:white; letter-spacing: 6px; text-transform: uppercase; margin-left: 60px; margin-bottom: 10px; }
        .divider { height:1px; background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent); margin:25px 0; }
        .input-group { position: relative; display: flex; align-items: center; }
        input { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 18px 60px 18px 18px; border-radius: 18px; color: white; outline: none; transition: 0.4s; font-size: 14px; font-weight: 300; }
        
        /* Micrófono Minimalista */
        .mic-container { position: absolute; right: 18px; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .mic-ring { width: 12px; height: 12px; border: 1.5px solid rgba(255,0,204,0.4); border-radius: 50%; transition: 0.3s; }
        .active .mic-ring { width: 18px; height: 18px; border-color: #ff00cc; box-shadow: 0 0 10px #ff00cc; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.3); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }

        #response { margin-top: 25px; font-size: 13px; color: rgba(255,255,255,0.8); line-height: 1.6; min-height: 50px; white-space: pre-wrap; max-height: 320px; overflow-y: auto; padding-right: 8px; }
        #response::-webkit-scrollbar { width: 3px; }
        #response::-webkit-scrollbar-thumb { background: rgba(255,0,204,0.2); }
        .user-tag { position: absolute; top: 20px; right: 40px; font-size: 9px; color: #ff00cc; letter-spacing: 2px; opacity: 0.7; }
    </style>
</head>
<body>

<div class="card">
    <div id="user-display" class="user-tag"></div>
    <svg class="lightning" viewBox="0 0 100 150">
        <path d="M60 0 L20 80 L55 80 L35 150 L85 60 L50 60 Z"/>
    </svg>
    <div class="title">Hakai</div>
    <div class="divider"></div>
    <div class="input-group">
        <input type="text" id="user-input" placeholder="Comando o voz..." onkeypress="if(event.key==='Enter') processData()">
        <div class="mic-container" id="mic-toggle" onclick="toggleMic()">
            <div class="mic-ring"></div>
        </div>
    </div>
    <div id="response">Sincronizando flujo...</div>
</div>

<script>
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'es-CL';
        recognition.onresult = (e) => { document.getElementById('user-input').value = e.results[0][0].transcript; processData(); };
        recognition.onend = () => document.getElementById('mic-toggle').classList.remove('active');
    }

    function toggleMic() {
        if (!recognition) return;
        document.getElementById('mic-toggle').classList.add('active');
        recognition.start();
    }

    let GH_TOKEN = localStorage.getItem('h_gh_token');
    let GIST_ID = localStorage.getItem('h_gist_id');
    let GROQ_KEY = localStorage.getItem('h_groq');
    let USER_NAME = localStorage.getItem('h_user');
    let state = { categorias: {}, historial: [] };

    async function loadCloud() {
        if (!GH_TOKEN || !GIST_ID || !GROQ_KEY || !USER_NAME) {
            if(!USER_NAME) localStorage.setItem('h_user', prompt("Nombre:"));
            if(!GH_TOKEN) localStorage.setItem('h_gh_token', prompt("Token GitHub:"));
            if(!GIST_ID) localStorage.setItem('h_gist_id', prompt("Gist ID:"));
            if(!GROQ_KEY) localStorage.setItem('h_groq', prompt("Groq Key:"));
            location.reload(); return;
        }
        try {
            const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, { headers: { "Authorization": `token ${GH_TOKEN}` } });
            const data = await res.json();
            state = JSON.parse(data.files["hakai.json"].content);
            document.getElementById('user-display').innerText = USER_NAME;
            document.getElementById('response').innerText = "Hakai Online.";
        } catch (e) { document.getElementById('response').innerText = "Error de sincronización."; }
    }

    async function processData() {
        const inputField = document.getElementById('user-input');
        const input = inputField.value;
        const resDiv = document.getElementById('response');
        if (!input) return;

        resDiv.innerText = "...";
        const ahora = new Date().toLocaleString('es-CL', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
                method: "POST",
                body: JSON.stringify({ 
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        { role: "system", content: `IA de finanzas. REGLAS: 
                        1. "detalle" -> lista saldos. 
                        2. "detalle completo" -> lista saldos + historial completo. 
                        3. Normal: < 10 palabras. 
                        4. Historial: [Fecha] | [Acción] | [Monto] | por ${USER_NAME}.
                        5. OBLIGATORIO: JSON final tras ###. No pongas nada después de la llave de cierre del JSON.` },
                        { role: "user", content: `Estado: ${JSON.stringify(state)}. Comando: ${input}` }
                    ],
                    temperature: 0
                }),
            });
            const data = await response.json();
            const rawText = data.choices[0].message.content;
            
            if (rawText.includes('###')) {
                const parts = rawText.split('###');
                const mensaje = parts[0].trim();
                const jsonPart = parts[parts.length - 1].trim();
                
                // Limpieza profunda de JSON
                const cleanJson = jsonPart.substring(jsonPart.indexOf('{'), jsonPart.lastIndexOf('}') + 1);
                state = JSON.parse(cleanJson);

                await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                    method: 'PATCH',
                    headers: { "Authorization": `token ${GH_TOKEN}` },
                    body: JSON.stringify({ files: { "hakai.json": { content: JSON.stringify(state) } } })
                });
                resDiv.innerText = mensaje;
            } else { resDiv.innerText = rawText.trim(); }
            inputField.value = "";
            resDiv.scrollTop = 0;
        } catch (e) { resDiv.innerText = "Error procesando flujo."; console.error(e); }
    }
    loadCloud();
</script>
</body>
</html>
