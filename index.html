<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>| HAKAI |</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }
        body { height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; background:#070012; overflow:hidden; }
        body::before { content:""; position:absolute; width:600px; height:600px; background: radial-gradient(circle, rgba(255,0,255,0.12), transparent 70%); filter: blur(120px); right:5%; top:15%; z-index: -1; }
        .card { width:90%; max-width:500px; border-radius:40px; padding:40px; position:relative; background: rgba(255,255,255,0.02); backdrop-filter: blur(30px); border:1px solid rgba(255,0,200,0.2); box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        .lightning { position:absolute; left:-35px; top:-25px; width:110px; z-index: 2; }
        .lightning path { stroke:#ff00cc; stroke-width:6; fill:none; filter: drop-shadow(0 0 12px #ff00cc); }
        .title { font-size:38px; font-weight:300; color:white; letter-spacing: 6px; text-transform: uppercase; margin-left: 60px; margin-bottom: 10px; }
        .divider { height:1px; background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent); margin:25px 0; }
        .input-area { margin-top: 20px; position: relative; }
        input { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 18px; border-radius: 18px; color: white; outline: none; transition: 0.4s; font-size: 14px; font-weight: 300; }
        input:focus { border-color: #ff00cc; background: rgba(255,0,200,0.04); }
        #response { margin-top: 20px; font-size: 14px; color: rgba(255,255,255,0.8); line-height: 1.6; min-height: 40px; font-weight: 300; white-space: pre-wrap; max-height: 200px; overflow-y: auto; }
        .buttons { display:flex; gap:12px; margin-top:30px; }
        button { flex:1; padding:14px; border-radius:16px; border:1px solid rgba(255,255,255,0.05); background: rgba(255,255,255,0.03); color:rgba(255,255,255,0.6); cursor:pointer; transition:0.3s; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; }
        .confirm { background: linear-gradient(45deg,#9d00ff,#ff00cc); border:none; color:white; }
        .token-hint { position: absolute; bottom: 10px; font-size: 9px; color: rgba(255,255,255,0.1); cursor: pointer; text-decoration: none; }
    </style>
</head>
<body>

<div class="card">
    <svg class="lightning" viewBox="0 0 100 150">
        <path d="M60 0 L20 80 L55 80 L35 150 L85 60 L50 60 Z"/>
    </svg>
    <div class="title">Hakai</div>
    <div class="divider"></div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Comando o 'detalle'..." onkeypress="if(event.key==='Enter') processData()">
    </div>
    <div id="response">Hakai lista.</div>
    <div class="buttons">
        <button class="confirm" onclick="processData()">Sincronizar</button>
        <button onclick="exportarExcel()">Reporte</button>
    </div>
    <a class="token-hint" onclick="resetToken()">Cambiar API Key</a>
</div>

<script>
    let GROQ_KEY = localStorage.getItem('hakai_groq_key'); 
    let state = JSON.parse(localStorage.getItem('hakai_v14')) || {
        categorias: { arriendo: 0, mercaderia: 0, transporte: 0, salud: 0, ahorro: 0, personal: 0 },
        presupuestos_base: { arriendo: 0, mercaderia: 0, transporte: 0, salud: 0, personal: 0 },
        ultimo_reinicio: null
    };

    function updateUI() {
        localStorage.setItem('hakai_v14', JSON.stringify(state));
        if(GROQ_KEY) localStorage.setItem('hakai_groq_key', GROQ_KEY);
    }

    function resetToken() {
        const nuevo = prompt("API Key de Groq:");
        if(nuevo) { GROQ_KEY = nuevo; updateUI(); location.reload(); }
    }

    async function processData() {
        const inputField = document.getElementById('user-input');
        const input = inputField.value;
        const resDiv = document.getElementById('response');

        if (!GROQ_KEY) {
            GROQ_KEY = prompt("API Key de Groq:");
            if (GROQ_KEY) updateUI(); else return;
        }

        if (!input) return;
        resDiv.innerText = "Procesando...";

        const hoy = new Date();
        const mesActual = (hoy.getMonth() + 1) + "-" + hoy.getFullYear();
        let modoReinicio = (hoy.getDate() === 1 && state.ultimo_reinicio !== mesActual);

        const promptSystem = `Eres Hakai, sistema financiero minimalista.
        REGLAS:
        1. Si el usuario pide "detalle", "estado" o "saldos", lista cada categoría con su valor actual.
        2. En peticiones normales: menos de 10 palabras.
        3. No muestres el JSON al usuario.
        4. Si el usuario define un presupuesto total y asigna partes, el sobrante va a 'ahorro'.
        5. Sobre-gasto: resta de 'ahorro' y avisa reposición breve.
        6. Reinicio Mensual (Modo: ${modoReinicio}): Suma excedentes a ahorro y restaura presupuestos base.
        Estructura de respuesta: [Mensaje de texto] ### [JSON actualizado]
        Estado actual: ${JSON.stringify(state)}`;

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
                method: "POST",
                body: JSON.stringify({ 
                    model: "llama-3.3-70b-versatile",
                    messages: [{ role: "system", content: promptSystem }, { role: "user", content: input }],
                    temperature: 0
                }),
            });

            const data = await response.json();
            const rawText = data.choices[0].message.content;
            
            if (rawText.includes('###')) {
                const [mensaje, jsonPart] = rawText.split('###');
                try {
                    const cleanJson = jsonPart.trim().replace(/^[^{]*/, '').replace(/[^}]*$/, '');
                    state = JSON.parse(cleanJson);
                    if (modoReinicio) state.ultimo_reinicio = mesActual;
                    updateUI();
                    resDiv.innerText = mensaje.trim();
                } catch(e) {
                    resDiv.innerText = "Hakai: Error en lectura de datos.";
                    console.log("JSON Error:", jsonPart);
                }
            } else {
                resDiv.innerText = rawText.trim();
            }
            inputField.value = "";

        } catch (e) {
            resDiv.innerText = "Error de conexión con el núcleo.";
        }
    }

    function exportarExcel() {
        const content = "HAKAI REPORT\n" + JSON.stringify(state, null, 2);
        const blob = new Blob([content], {type: 'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'Hakai_Status.txt'; a.click();
    }
</script>
</body>
</html>
