<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>| HAKAI |</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }
        body { height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; background:#070012; overflow:hidden; }
        body::before { content:""; position:absolute; width:600px; height:600px; background: radial-gradient(circle, rgba(255,0,255,0.12), transparent 70%); filter: blur(120px); right:5%; top:15%; z-index: -1; }
        .card { width:90%; max-width:500px; border-radius:40px; padding:40px; position:relative; background: rgba(255,255,255,0.02); backdrop-filter: blur(30px); border:1px solid rgba(255,0,200,0.2); box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        .lightning { position:absolute; left:-35px; top:-25px; width:110px; z-index: 2; }
        .lightning path { stroke:#ff00cc; stroke-width:6; fill:none; filter: drop-shadow(0 0 12px #ff00cc); }
        .title { font-size:38px; font-weight:300; color:white; letter-spacing: 6px; text-transform: uppercase; margin-left: 60px; margin-bottom: 10px; }
        .divider { height:1px; background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent); margin:25px 0; }
        input { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 18px; border-radius: 18px; color: white; outline: none; transition: 0.4s; font-size: 14px; }
        #response { margin-top: 25px; font-size: 13px; color: rgba(255,255,255,0.8); line-height: 1.5; min-height: 50px; white-space: pre-wrap; max-height: 350px; overflow-y: auto; }
        .user-tag { position: absolute; top: 20px; right: 40px; font-size: 10px; color: #ff00cc; letter-spacing: 2px; }
        .reset-btn { position: absolute; bottom: 15px; left: 40px; font-size: 8px; color: rgba(255,255,255,0.1); cursor: pointer; text-decoration: none; }
    </style>
</head>
<body>

<div class="card">
    <div id="user-display" class="user-tag"></div>
    <svg class="lightning" viewBox="0 0 100 150">
        <path d="M60 0 L20 80 L55 80 L35 150 L85 60 L50 60 Z"/>
    </svg>
    <div class="title">Hakai</div>
    <div class="divider"></div>
    <input type="text" id="user-input" placeholder="Configurando..." onkeypress="if(event.key==='Enter') processData()">
    <div id="response">Cargando sistema...</div>
    <a class="reset-btn" onclick="resetConfig()">RESET CONFIG</a>
</div>

<script>
    let GH_TOKEN = localStorage.getItem('h_gh_token');
    let GIST_ID = localStorage.getItem('h_gist_id');
    let GROQ_KEY = localStorage.getItem('h_groq');
    let USER_NAME = localStorage.getItem('h_user');
    
    let state = { categorias: {arriendo:0, mercaderia:0, transporte:0, salud:0, ahorro:0, personal:0}, presupuestos_base: {}, historial: [] };

    async function loadCloud() {
        if (!GH_TOKEN || !GIST_ID || !GROQ_KEY || !USER_NAME) {
            if(!USER_NAME) localStorage.setItem('h_user', prompt("¿Quién eres?"));
            if(!GH_TOKEN) localStorage.setItem('h_gh_token', prompt("GitHub Token (nuevo):"));
            if(!GIST_ID) localStorage.setItem('h_gist_id', prompt("Gist ID:"));
            if(!GROQ_KEY) localStorage.setItem('h_groq', prompt("Groq API Key:"));
            location.reload();
            return;
        }

        try {
            const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                headers: { "Authorization": `token ${GH_TOKEN}` }
            });
            const data = await res.json();
            const content = data.files["hakai.json"].content;
            if (content !== "{}") state = JSON.parse(content);
            
            document.getElementById('user-display').innerText = localStorage.getItem('h_user');
            document.getElementById('response').innerText = "Hakai Online.";
            document.getElementById('user-input').placeholder = "Escribe un comando...";
        } catch (e) { 
            document.getElementById('response').innerText = "Error de config. Revisa el Token o Gist ID."; 
        }
    }

    async function processData() {
        const inputField = document.getElementById('user-input');
        const input = inputField.value;
        const resDiv = document.getElementById('response');
        if (!input) return;

        resDiv.innerText = "...";
        const ahora = new Date().toLocaleString('es-CL', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
                method: "POST",
                body: JSON.stringify({ 
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        { role: "system", content: `IA compartida. Responde <10 palabras (salvo detalle). JSON tras ###. Sobras a ahorro. Sobre-gasto resta de ahorro. Historial: [Fecha] | [Acción] | [Monto] | por ${USER_NAME}.` },
                        { role: "user", content: `Estado: ${JSON.stringify(state)}. Comando: ${input}` }
                    ],
                    temperature: 0
                }),
            });

            const data = await response.json();
            const rawText = data.choices[0].message.content;
            
            if (rawText.includes('###')) {
                const [mensaje, jsonPart] = rawText.split('###');
                state = JSON.parse(jsonPart.trim().replace(/^[^{]*/, '').replace(/[^}]*$/, ''));
                
                await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                    method: 'PATCH',
                    headers: { "Authorization": `token ${GH_TOKEN}` },
                    body: JSON.stringify({ files: { "hakai.json": { content: JSON.stringify(state) } } })
                });
                resDiv.innerText = mensaje.trim();
            } else { resDiv.innerText = rawText.trim(); }
            inputField.value = "";
        } catch (e) { resDiv.innerText = "Error de red."; }
    }

    function resetConfig() { localStorage.clear(); location.reload(); }
    loadCloud();
</script>
</body>
</html>
