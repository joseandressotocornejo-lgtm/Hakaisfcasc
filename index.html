<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAKAI | Voice Cloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }
        body { height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; background:#070012; overflow:hidden; }
        body::before { content:""; position:absolute; width:600px; height:600px; background: radial-gradient(circle, rgba(255,0,255,0.12), transparent 70%); filter: blur(120px); right:5%; top:15%; z-index: -1; }
        .card { width:90%; max-width:500px; border-radius:40px; padding:40px; position:relative; background: rgba(255,255,255,0.02); backdrop-filter: blur(30px); border:1px solid rgba(255,0,200,0.2); box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        .lightning { position:absolute; left:-35px; top:-25px; width:110px; z-index: 2; }
        .lightning path { stroke:#ff00cc; stroke-width:6; fill:none; filter: drop-shadow(0 0 12px #ff00cc); }
        .title { font-size:38px; font-weight:300; color:white; letter-spacing: 6px; text-transform: uppercase; margin-left: 60px; margin-bottom: 10px; }
        .divider { height:1px; background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent); margin:25px 0; }
        .input-group { position: relative; display: flex; align-items: center; }
        input { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 18px 50px 18px 18px; border-radius: 18px; color: white; outline: none; transition: 0.4s; font-size: 14px; }
        .mic-btn { position: absolute; right: 15px; cursor: pointer; color: #ff00cc; font-size: 20px; transition: 0.3s; background: none; border: none; }
        .mic-btn.active { filter: drop-shadow(0 0 8px #ff00cc); transform: scale(1.2); }
        #response { margin-top: 25px; font-size: 13px; color: rgba(255,255,255,0.8); line-height: 1.5; min-height: 50px; white-space: pre-wrap; max-height: 300px; overflow-y: auto; }
        .user-tag { position: absolute; top: 20px; right: 40px; font-size: 10px; color: #ff00cc; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="card">
    <div id="user-display" class="user-tag"></div>
    <svg class="lightning" viewBox="0 0 100 150">
        <path d="M60 0 L20 80 L55 80 L35 150 L85 60 L50 60 Z"/>
    </svg>
    <div class="title">Hakai</div>
    <div class="divider"></div>
    <div class="input-group">
        <input type="text" id="user-input" placeholder="Dicta o escribe..." onkeypress="if(event.key==='Enter') processData()">
        <button class="mic-btn" id="mic-toggle" onclick="toggleMic()">🎤</button>
    </div>
    <div id="response">Hakai lista para escuchar.</div>
</div>

<script>
    // Configuración de Voz
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'es-CL';
        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            document.getElementById('user-input').value = transcript;
            processData(); // Envía automáticamente al terminar de hablar
        };
        recognition.onend = () => document.getElementById('mic-toggle').classList.remove('active');
    }

    function toggleMic() {
        if (!recognition) return alert("Voz no soportada en este navegador.");
        document.getElementById('mic-toggle').classList.add('active');
        recognition.start();
    }

    // Lógica de Datos (Copia de la versión estable anterior)
    let GH_TOKEN = localStorage.getItem('h_gh_token');
    let GIST_ID = localStorage.getItem('h_gist_id');
    let GROQ_KEY = localStorage.getItem('h_groq');
    let USER_NAME = localStorage.getItem('h_user');
    let state = { categorias: {}, historial: [] };

    async function loadCloud() {
        if (!GH_TOKEN || !GIST_ID || !GROQ_KEY || !USER_NAME) {
            if(!USER_NAME) localStorage.setItem('h_user', prompt("¿Quién eres?"));
            if(!GH_TOKEN) localStorage.setItem('h_gh_token', prompt("GitHub Token:"));
            if(!GIST_ID) localStorage.setItem('h_gist_id', prompt("Gist ID:"));
            if(!GROQ_KEY) localStorage.setItem('h_groq', prompt("Groq API Key:"));
            location.reload(); return;
        }
        try {
            const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, { headers: { "Authorization": `token ${GH_TOKEN}` } });
            const data = await res.json();
            state = JSON.parse(data.files["hakai.json"].content);
            document.getElementById('user-display').innerText = USER_NAME;
            document.getElementById('response').innerText = "Hakai Sincronizada.";
        } catch (e) { document.getElementById('response').innerText = "Error de conexión."; }
    }

    async function processData() {
        const inputField = document.getElementById('user-input');
        const input = inputField.value;
        const resDiv = document.getElementById('response');
        if (!input) return;

        resDiv.innerText = "...";
        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
                method: "POST",
                body: JSON.stringify({ 
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        { role: "system", content: `IA de finanzas. Respuestas < 10 palabras (salvo detalle). JSON tras ###. Historial: [Fecha] | [Acción] | [Monto] | por ${USER_NAME}.` },
                        { role: "user", content: `Estado: ${JSON.stringify(state)}. Comando: ${input}` }
                    ],
                    temperature: 0
                }),
            });
            const data = await response.json();
            const rawText = data.choices[0].message.content;
            
            if (rawText.includes('###')) {
                const parts = rawText.split('###');
                state = JSON.parse(parts[parts.length - 1].trim().match(/\{[\s\S]*\}/)[0]);
                await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                    method: 'PATCH',
                    headers: { "Authorization": `token ${GH_TOKEN}` },
                    body: JSON.stringify({ files: { "hakai.json": { content: JSON.stringify(state) } } })
                });
                resDiv.innerText = parts[0].trim();
            } else { resDiv.innerText = rawText.trim(); }
            inputField.value = "";
        } catch (e) { resDiv.innerText = "Error de red."; }
    }
    loadCloud();
</script>
</body>
</html>
