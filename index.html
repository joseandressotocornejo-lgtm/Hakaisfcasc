<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>| HAKAI |</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }
        body { height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; background:#070012; overflow:hidden; }
        body::before { content:""; position:absolute; width:600px; height:600px; background: radial-gradient(circle, rgba(255,0,255,0.12), transparent 70%); filter: blur(120px); right:5%; top:15%; z-index: -1; }
        .card { width:90%; max-width:500px; border-radius:40px; padding:40px; position:relative; background: rgba(255,255,255,0.02); backdrop-filter: blur(30px); border:1px solid rgba(255,0,200,0.2); box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        .lightning { position:absolute; left:-35px; top:-25px; width:110px; z-index: 2; }
        .lightning path { stroke:#ff00cc; stroke-width:6; fill:none; filter: drop-shadow(0 0 12px #ff00cc); }
        .title { font-size:38px; font-weight:300; color:white; letter-spacing: 6px; text-transform: uppercase; margin-left: 60px; margin-bottom: 10px; }
        .divider { height:1px; background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent); margin:25px 0; }
        input { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 18px; border-radius: 18px; color: white; outline: none; transition: 0.4s; font-size: 14px; }
        #response { margin-top: 25px; font-size: 13px; color: rgba(255,255,255,0.8); line-height: 1.5; min-height: 50px; white-space: pre-wrap; max-height: 350px; overflow-y: auto; }
        .user-tag { position: absolute; top: 20px; right: 40px; font-size: 10px; color: #ff00cc; letter-spacing: 2px; }
        #response::-webkit-scrollbar { width: 4px; }
        #response::-webkit-scrollbar-thumb { background: rgba(255,0,204,0.3); border-radius: 10px; }
    </style>
</head>
<body>

<div class="card">
    <div id="user-display" class="user-tag"></div>
    <svg class="lightning" viewBox="0 0 100 150">
        <path d="M60 0 L20 80 L55 80 L35 150 L85 60 L50 60 Z"/>
    </svg>
    <div class="title">Hakai</div>
    <div class="divider"></div>
    <input type="text" id="user-input" placeholder="Sincronizando..." onkeypress="if(event.key==='Enter') processData()">
    <div id="response">Conectando a la nube...</div>
</div>

<script>
    // Credenciales fijas
    const GH_TOKEN = "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";
    const GIST_ID = "c87bb48fa76fb15b48ed50d59619b2a4";
    let GROQ_KEY = localStorage.getItem('h_groq');
    let USER_NAME = localStorage.getItem('h_user');
    
    let state = { categorias: {}, presupuestos_base: {}, historial: [] };

    // Cargar datos del Gist
    async function loadCloud() {
        try {
            const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                headers: { "Authorization": `token ${GH_TOKEN}` }
            });
            const data = await res.json();
            const content = data.files["hakai.json"].content;
            state = content === "{}" ? { categorias: {arriendo:0, mercaderia:0, transporte:0, salud:0, ahorro:0, personal:0}, presupuestos_base: {}, historial: [] } : JSON.parse(content);
            document.getElementById('response').innerText = "Hakai en línea.";
            document.getElementById('user-input').placeholder = "Escribe un comando...";
        } catch (e) { 
            document.getElementById('response').innerText = "Error al conectar con GitHub."; 
        }
    }

    if (!USER_NAME) {
        USER_NAME = prompt("¿Quién eres?");
        if (USER_NAME) localStorage.setItem('h_user', USER_NAME);
    }
    document.getElementById('user-display').innerText = USER_NAME || "USER";
    
    loadCloud();

    async function processData() {
        const inputField = document.getElementById('user-input');
        const input = inputField.value;
        const resDiv = document.getElementById('response');

        if (!GROQ_KEY) {
            GROQ_KEY = prompt("Introduce tu API Key de Groq:");
            if (GROQ_KEY) localStorage.setItem('h_groq', GROQ_KEY);
            else return;
        }

        if (!input) return;
        resDiv.innerText = "...";
        
        const ahora = new Date().toLocaleString('es-CL', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });

        const promptSystem = `Eres Hakai, IA compartida para ${USER_NAME}.
        REGLAS:
        1. DETALLE: Si piden "detalle completo" o "estado", lista saldos e historial de movimientos.
        2. NORMAL: Menos de 10 palabras. Responde solo lo que se pregunta.
        3. HISTORIAL: Registra cada gasto/aporte en 'historial': "DD/MM HH:MM | Acción | Monto | por ${USER_NAME}".
        4. LÓGICA: Presupuestos sobran -> Ahorro. Gasto extra -> Resta de ahorro y avisa reposición.
        5. IMPORTANTE: JSON al final tras ###.
        Estado actual: ${JSON.stringify(state)}`;

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
                method: "POST",
                body: JSON.stringify({ 
                    model: "llama-3.3-70b-versatile",
                    messages: [{ role: "system", content: promptSystem }, { role: "user", content: input }],
                    temperature: 0
                }),
            });

            const data = await response.json();
            const rawText = data.choices[0].message.content;
            
            if (rawText.includes('###')) {
                const [mensaje, jsonPart] = rawText.split('###');
                state = JSON.parse(jsonPart.trim().replace(/^[^{]*/, '').replace(/[^}]*$/, ''));
                
                // Guardar en GitHub Gist
                await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                    method: 'PATCH',
                    headers: { "Authorization": `token ${GH_TOKEN}` },
                    body: JSON.stringify({ files: { "hakai.json": { content: JSON.stringify(state) } } })
                });

                resDiv.innerText = mensaje.trim();
            } else {
                resDiv.innerText = rawText.trim();
            }
            inputField.value = "";
            resDiv.scrollTop = 0;
        } catch (e) {
            resDiv.innerText = "Error de red o API Key inválida.";
        }
    }
</script>
</body>
</html>
